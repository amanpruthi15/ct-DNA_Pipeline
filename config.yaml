# PIPELINE RUN STEPS

run_steps:

  read_trimming: true
  fastq_to_bam: true
  align_consensus_umis: true
  base_recalibration: true
  variant_calling: true

paths:

  fastq: "trimmed_fastq"
  bam: "bam"
  temp: "/temp_computing"
  job: "job_files"
  job_out: "job_output"
  job_err: "job_error"

tools:

  trimmomatic: "java -jar /path/to/trimmomatic-0.39.jar"
  fgbio: "/path/to/fgbio-3.1.2.jar"
  gatk: "/path/to/gatk-4.3.0.0/gatk"
  bwa: "/path/to/bwa/bwa"
  samtools: "/path/to/miniconda3/bin/samtools"
  picard: "/path/to/picard.jar"
  freebayes: "/path/to/miniconda3/bin/freebayes"
  bcftools: "/opt/bcftools"
  bgzip: "/path/to/miniconda3/bin/bgzip"
  tabix: "/path/to/miniconda3/bin/tabix"

trimming:

  illumina_clip:
    seed_mismatches: 2
    palindrome_clip_threshold: 30
    simple_clip_threshold: 10
    min_adapter_length: 2
    keep_both_reads: true

  headcrop: 0
  trailing: 25
  slidingwindow:
    window: 4
    quality: 20

  minlen: 100

references:
  adapters: "/path/to/adapters/TruSeq3-PE-2.fa"
  fasta: "/path/to/hg38/hg38.fa"
  bwa_index: "/path/to/hg38/hg38"

mutect2:

  panel_of_normals: "/path/to/mutect2_data/1000g_pon.hg38.vcf.gz"
  germline_resource: "/path/to/mutect2_data/af-only-gnomad.hg38.vcf.gz"

funcotator:

  datasource: "/path/to/funcotator_dataSources.v1.7.20200521s"

vep:

  cache_dir: "/path/to/vep_data"
  plugin_dir: "/path/to/vep_data/VEP_plugins"

panels:

  onco_bed: "/path/to/hg38/oncology_panel.bed"
  onco_interval: "/path/to/hg38/oncology_panel.interval_list"

known_sites:

  dbsnp: "/path/to/dbsnp/00-common_all_prefix.vcf"

umi:

  grouping:
    edits: 5
    strategy: "Adjacency"

  consensus:
    min_reads: 1
    min_base_quality: 20

bqsr:

  apply: true

outputs:

  final_bam_suffix: ".consensus.mapped.filtered.recalibrated.onco.bam"
